<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – AnimVerse AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <style>
    body { min-height: 100vh; background: var(--off-white); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .fp-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 56px 48px;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      text-align: center;
    }
    .fp-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(255,214,10,0.35);
    }
    .fp-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
    .fp-desc { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 32px; line-height: 1.6; }
    .btn-fp {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .btn-fp:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(230,57,70,0.40); }
    .back-to-login { display: block; margin-top: 20px; font-size: 0.85rem; color: var(--text-muted); }
    .back-to-login a { color: var(--primary); font-weight: 600; }
  </style>
</head>
<body>
  <div class="fp-card">
    <div class="fp-icon">🔑</div>
    <h1 class="fp-title">Forgot Password?</h1>
    <p class="fp-desc">Enter your email address and we'll send you a link to reset your password.</p>
    <div class="alert alert-error" id="alertBox" style="text-align:left;">
      <i class="fas fa-exclamation-circle"></i> <span id="alertMsg"></span>
    </div>
    <div class="alert alert-success" id="successBox" style="text-align:left;">
      <i class="fas fa-check-circle"></i> <span id="successMsg"></span>
    </div>
    <form onsubmit="handleForgot(event)">
      <div class="form-group" style="text-align:left;">
        <label for="fpEmail">Email Address</label>
        <div class="input-icon-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="form-control" id="fpEmail" placeholder="you@example.com" required />
        </div>
      </div>
      <button type="submit" class="btn-fp"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
    </form>
    <div class="back-to-login">Remember your password? <a href="login.html">Sign in</a></div>
  </div>
  <script>
    function showAlert(type, msg) {
      document.getElementById('alertBox').classList.remove('show');
      document.getElementById('successBox').classList.remove('show');
      if (type === 'error') { document.getElementById('alertMsg').textContent = msg; document.getElementById('alertBox').classList.add('show'); }
      else { document.getElementById('successMsg').textContent = msg; document.getElementById('successBox').classList.add('show'); }
    }
    async function handleForgot(e) {
      e.preventDefault();
      const email = document.getElementById('fpEmail').value.trim();
      if (!email) { showAlert('error', 'Please enter your email address.'); return; }
      try {
        const res = await fetch('/api/auth/forgot-password', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email}) });
        const data = await res.json();
        if (data.success) { showAlert('success', 'Password reset link sent! Please check your email inbox.'); }
        else { showAlert('error', data.message || 'Email not found in our system.'); }
      } catch { showAlert('error', 'Server error. Please try again later.'); }
    }
  </script>
</body>
</html>
